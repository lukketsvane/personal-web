name: Sync Notion Content

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./iverfinne.no
        run: npm ci

      - name: Run Notion Sync
        working-directory: ./iverfinne.no
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: npm run sync

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Notion Sync Bot'
          git config --global user.email 'bot@noreply.github.com'
          
          # Check for changes
          if [[ -n $(git status -s) ]]; then
            echo "Changes detected. Committing..."
            git add .
            git commit -m "content: sync from notion [skip ci]"
            git push
          else
            echo "No changes detected."
          fi
